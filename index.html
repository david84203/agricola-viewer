<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>農家樂 Agricola — 卡牌圖鑑</title>
  <meta name="description" content="農家樂（Agricola）繁體中文化卡牌資料庫，收錄次要發展卡與職業卡的完整效果說明與卡片圖像。" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;600;700&family=Cinzel:wght@600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="auth.css" />
  <link rel="stylesheet" href="admin.css" />
</head>
<body>
  <div class="top-brand-bar">
    <div class="brand-left">
      <a href="https://uggboardgame.vercel.app/" class="logo-link"><img src="./images/ugg-logo.png" alt="UGG Logo" class="ugg-logo" /></a>
      <div class="brand-text">
        <div class="brand-title">農家樂 Agricola 卡牌圖鑑</div>
        <div class="brand-sub">台灣繁體中文版翻譯</div>
        <div id="authBarMount"></div>
      </div>
    </div>
    <div class="brand-center">
      翻譯、編輯、排版、網頁編寫為烏嘎嘎桌遊小路獨立製作，禁止用於任何商業用途。
    </div>
    <div class="brand-right">
      <div style="display:flex; align-items:center; gap:12px;">
        <div>
          <span class="highlight">共 <span id="totalCount">0</span> 張卡牌</span><br/>
          <small style="color:var(--text3);">目前收錄：A, B, C, D, E, AY, FL, Cz, G8, I, L, 舊版E</small>
        </div>
        <button id="banlistBtn" class="draft-nav-btn" style="cursor:pointer; font-family:inherit;">🚫 禁卡表</button>
        <button id="banAdminBtn" class="draft-nav-btn" style="cursor:pointer; font-family:inherit; display:none;">⚙️ 禁卡管理</button>
        <a href="draft.html" class="draft-nav-btn">🎲 輪抽模擬器</a>
        <a href="tierlist.html" class="draft-nav-btn">📊 Tier List</a>
        <a href="duplicates.html" class="draft-nav-btn">🔁 重複卡牌</a>
        <a href="./list.html" style="
          display:inline-flex; align-items:center; gap:6px;
          background:var(--bg3); border:1px solid var(--border); border-radius:100px;
          padding:6px 14px; font-size:.82rem; color:var(--text2);
          text-decoration:none; transition:all var(--transition);
          white-space:nowrap;
        "
        onmouseover="this.style.borderColor='var(--gold)';this.style.color='var(--gold)'"
        onmouseout="this.style.borderColor='var(--border)';this.style.color='var(--text2)'">
          📋 文字列表版
        </a>
      </div>
    </div>
  </div>



  <main class="main-container">
    <!-- Filters -->
    <section class="filter-bar">
      <div class="search-wrap">
        <span class="search-icon">🔍</span>
        <input
          type="text"
          id="searchInput"
          class="search-input"
          placeholder="搜尋牌名、說明、卡片ID…"
          autocomplete="off"
        />
        <button class="clear-btn" id="clearSearch" title="清除">✕</button>
      </div>
      <div class="filter-chips">
        <button class="chip active" data-filter="all">全部</button>
        <button class="chip" data-filter="minor">次要發展卡</button>
        <button class="chip" data-filter="occupation">職業卡</button>
        <button class="chip" data-filter="both">雙色卡</button>
      </div>
      <button class="chip chip-toggle" id="excludeBanBtn">排除禁卡</button>
      <div class="deck-filter">
        <label for="deckSelect">牌組</label>
        <select id="deckSelect">
          <option value="all">全部</option>
        </select>
      </div>
    </section>

    <!-- Results info -->
    <div class="results-info" id="resultsInfo">載入中…</div>

    <!-- Card grid -->
    <section class="card-grid" id="cardGrid"></section>
  </main>

  <!-- Detail Modal -->
  <div class="modal-overlay" id="modalOverlay">
    <div class="modal" id="modal">
      <button class="modal-close" id="modalClose">✕</button>
      <div class="modal-inner">
        <div class="modal-image-wrap">
          <canvas id="modalCanvas"></canvas>
        </div>
        <div class="modal-info">
          <div class="modal-title-row">
            <h2 class="modal-title" id="modalTitle"></h2>
            <div class="modal-badge" id="modalBadge"></div>
          </div>
          <div class="modal-sub-row">
            <div class="modal-id" id="modalId"></div>
            <span id="modalBanBadge" class="modal-ban-badge" style="display:none">禁卡</span>
          </div>
          <div class="modal-fields" id="modalFields"></div>
          <div class="modal-desc-wrap">
            <div class="modal-desc-label">說明</div>
            <div class="modal-desc" id="modalDesc"></div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Banlist Modal -->
  <div class="banlist-overlay" id="banlistOverlay">
    <div class="banlist-modal">
      <div class="banlist-header">
        <h2 class="banlist-title">禁卡表</h2>
        <button class="modal-close" id="banlistClose">✕</button>
      </div>
      <div class="banlist-body" id="banlistBody"></div>
    </div>
  </div>

  <script src="auth.js"></script>
  <script src="admin.js"></script>
  <script src="app.js"></script>
</body>
</html>
